<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Top arc: clockwise from left equator to right equator via the top -->
    <path id="topArc" d="M 28,100 A 72,72 0 0,1 172,100"/>
    <!-- Bottom arc: counter-clockwise from left equator to right equator via the bottom -->
    <path id="botArc" d="M 28,100 A 72,72 0 0,0 172,100"/>
    <!-- Clip soccer ball patches to ball circle -->
    <clipPath id="ballClip">
      <circle cx="100" cy="100" r="45"/>
    </clipPath>
  </defs>

  <!-- 1. Outer navy circle (full badge) -->
  <circle cx="100" cy="100" r="97" fill="#1a2e72"/>

  <!-- 2. White outer ring -->
  <circle cx="100" cy="100" r="87" fill="white"/>

  <!-- 3. Main navy body (text ring) -->
  <circle cx="100" cy="100" r="83" fill="#1a2e72"/>

  <!-- 4. Inner white ring (around football area) -->
  <circle cx="100" cy="100" r="57" fill="white"/>

  <!-- 5. Navy ring tight around ball -->
  <circle cx="100" cy="100" r="53" fill="#1a2e72"/>

  <!-- 6. Football: white circle -->
  <circle cx="100" cy="100" r="45" fill="white"/>

  <!-- 7. Soccer ball pentagon patches (clipped to ball circle) -->
  <g clip-path="url(#ballClip)" fill="#1a2e72" stroke="white" stroke-width="0.6" stroke-linejoin="round">
    <!-- Center pentagon -->
    <polygon points="100,89 110.5,96.6 106.5,108.9 93.5,108.9 89.5,96.6"/>
    <!-- Top pentagon -->
    <polygon points="100,87 91.4,80.8 94.7,70.7 105.3,70.7 108.6,80.8"/>
    <!-- Upper-right pentagon -->
    <polygon points="112.4,96 115.6,85.9 126.2,85.9 129.5,96 120.9,102.2"/>
    <!-- Lower-right pentagon -->
    <polygon points="107.6,110.5 118.2,110.5 121.5,120.6 112.9,126.8 104.4,120.6"/>
    <!-- Lower-left pentagon -->
    <polygon points="92.4,110.5 95.6,120.6 87.1,126.8 78.5,120.6 81.8,110.5"/>
    <!-- Upper-left pentagon -->
    <polygon points="87.6,96 79.1,102.2 70.5,96 73.8,85.9 84.4,85.9"/>
  </g>

  <!-- 8. "JACKMILLAN" — top curved text -->
  <text font-family="'Arial Black', Arial, sans-serif"
        font-size="12" font-weight="900"
        fill="white" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">JACKMILLAN</textPath>
  </text>

  <!-- 9. "FOOTBALL ACADEMY" — bottom curved text -->
  <text font-family="'Arial Black', Arial, sans-serif"
        font-size="9.5" font-weight="900"
        fill="white" letter-spacing="1.2">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">FOOTBALL ACADEMY</textPath>
  </text>

  <!-- 10. Year: 20 (left) and 24 (right) -->
  <text x="30" y="105"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="11" font-weight="900"
        fill="white" text-anchor="middle">20</text>
  <text x="170" y="105"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="11" font-weight="900"
        fill="white" text-anchor="middle">24</text>
</svg>
